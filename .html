<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とうものビンゴ</title>
    <style>
        :root { --bg-color: #071126; --accent-color: #ffa502; --primary-color: #ff4757; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; text-align: center; background-color: var(--bg-color); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .instruction { width: 100%; max-width: 420px; font-size: 11px; font-weight: bold; background-color: rgba(7, 17, 38, 0.85); padding: 8px; border-radius: 12px; color: #fff; margin-bottom: 12px; border: 1px solid rgba(255,165,2,0.4); }
        .bingo-outer { width: 100%; max-width: 420px; position: relative; }
        .bingo-container { position: relative; width: 100%; }
        .bg-image { width: 100%; height: auto; display: block; }
        
        .bingo-board { position: absolute; top: 25.4%; left: 29.2%; width: 41.6%; height: 70.8%; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 4.5% 3.5%; }
        .cell { background-color: rgba(255, 255, 255, 0.98); border: 1.5px solid #bdc3c7; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding: 5px; cursor: pointer; position: relative; aspect-ratio: 1/1; }
        .cell-text { font-size: 10px; font-weight: bold; color: #1a252f; z-index: 6; pointer-events: none; }
        .cell.selected .cell-text { opacity: 0.15; }
        .stamp-video { display: none; position: absolute; width: 100%; height: 100%; top: 0; left: 0; object-fit: cover; z-index: 7; pointer-events: none; }
        .cell.selected .stamp-video { display: block; }

        /* ポップアップと結果画面 */
        #clearPopup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7,17,38,0.95); z-index: 999; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #resultScreen { display: none; width: 100%; max-width: 420px; margin: 15px auto; padding: 15px; background: #ff4757; border-radius: 15px; color: #fff; }
    </style>
</head>
<body>

    <div class="instruction">マスをタップして「うちわ」スタンプをあつめよう！<br>1れつそろったら、画面をスタッフにみせてね！</div>

    <div class="bingo-outer">
        <div class="bingo-container">
            <img src="haikei.png" alt="背景" class="bg-image">
            <div class="bingo-board" id="board"></div>
        </div>
    </div>

    <div id="clearPopup">
        <h2>🎆 ビンゴ！ 🎆</h2>
        <button onclick="showResult()" style="padding:10px 20px; border-radius:20px; border:none;">けいひん引きかえへ</button>
    </div>

    <div id="resultScreen">
        <h3>🎁 けいひん引きかえ情報</h3>
        <p>場所：盆踊り受付（常盤南小学校）</p>
        <p>時間：18時半 〜 20時</p>
        <p>けいひん：屋台チケット</p>
        <button onclick="alert('スタッフ確認済み')">スタッフ確認</button>
    </div>

    <script>
        const items = [
            '<ruby>舞台<rt>ぶたい</rt></ruby>に<ruby>上<rt>あ</rt></ruby>がって<br>たのしんだ',
            '<ruby>絶対<rt>ぜったい</rt></ruby>に<br><ruby>来年<rt>らいねん</rt></ruby>も来る！！',
            '加藤ふみあきさんを<br>みつけた！',
            'オタゲーを<br>観た！',
            'とうもの会の<br>ゲームに<ruby>参加<rt>さんか</rt></ruby>した', 
            '<ruby>屋台<rt>やたい</rt></ruby>でお買物をした',
            '<ruby>盆踊<rt>ぼんおど</rt></ruby>りを<br>1<ruby>曲以上<rt>きょくいじょう</rt></ruby>おどった',
            '学校の<br><ruby>先生<rt>せんせい</rt></ruby>に会った',
            '<ruby>消防団<rt>しょうぼうだん</rt></ruby>の人に<br><ruby>挨拶<rt>あいさつ</rt></ruby>した'
        ];

        const board = document.getElementById('board');
        let cells = [];

        items.forEach((text) => {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<div class="cell-text">${text}</div><video class="stamp-video" src="uchiwa.mp4" loop muted playsinline></video>`;
            cell.addEventListener('click', () => {
                cell.classList.toggle('selected');
                const video = cell.querySelector('video');
                if(cell.classList.contains('selected')) video.play(); else { video.pause(); video.currentTime = 0; }
                checkBingo();
            });
            board.appendChild(cell);
            cells.push(cell);
        });

        function checkBingo() {
