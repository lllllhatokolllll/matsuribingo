<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>とうものビンゴ</title>
    <style>
        :root {
            --bg-color: #071126; 
            --accent-color: #ffa502;
            --primary-color: #ff4757;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            text-align: center;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .instruction {
            width: 100%;
            max-width: 420px;
            font-size: 11px;
            font-weight: bold;
            background-color: rgba(7, 17, 38, 0.85);
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255,165,2,0.4);
            line-height: 1.4;
            margin-bottom: 12px;
            color: #fff;
            z-index: 10;
        }

        .bingo-outer {
            width: 100%;
            max-width: 420px; 
            overflow: hidden; 
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .bingo-container {
            position: relative;
            width: 142%; 
            left: -21%;  
        }

        .bg-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .bingo-board {
            position: absolute;
            top: 25.4%;    
            left: 29.2%;   
            width: 41.6%;  
            height: 70.8%; 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4.5% 3.5%; 
        }

        .cell {
            background-color: rgba(255, 255, 255, 0.98); 
            border: 1.5px solid #bdc3c7;
            border-radius: 6px; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px; 
            cursor: pointer;
            position: relative;
            overflow: hidden; 
            aspect-ratio: 1 / 1; 
            width: 100%;
            height: 100%;
        }

        ruby { ruby-position: over; }
        rt { font-size: 7.5px; color: #555; font-weight: normal; }
        
        .cell-text {
            font-size: 12.5px; 
            font-weight: bold;
            line-height: 1.35;
            color: #1a252f; 
            word-break: break-all;
            z-index: 6; 
            transition: opacity 0.2s;
        }
        
        .cell.selected .cell-text { opacity: 0.15; }

        .stamp-video {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover; 
            z-index: 7;
            pointer-events: none; 
        }
        
        .cell.selected .stamp-video { display: block; }

        /* ビデオ読み込みエラー時の救済策（これで真っ黒画面を防ぎます） */
        .video-error-text {
            display: none;
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            color: #d35400;
        }
    </style>
</head>
<body>

    <div class="instruction">
        マスをタップして「うちわ」スタンプをあつめよう！<br>1れつそろったら、画面をスタッフにみせてね！
    </div>

    <div class="bingo-outer">
        <div class="bingo-container">
            <img src="haikei.png" alt="背景" class="bg-image">
            <div class="bingo-board" id="board"></div>
        </div>
    </div>

    <script>
        // 場所を入れ替えました！
        const items = [
            '<ruby>舞台<rt>ぶたい</rt></ruby>に<ruby>上<rt>あ</rt></ruby>がって<br>たのしんだ',
            '<ruby>絶対<rt>ぜったい</rt></ruby>に<br><ruby>来年<rt>らいねん</rt></ruby>も来る！！',
            '加藤ふみあきさんを<br>みつけた！',
            'オタゲーを<br>観た！',
            'とうもの会の<br>ゲームに<ruby>参加<rt>さんか</rt></ruby>した', 
            '<ruby>屋台<rt>やたい</rt></ruby>でお買物をした',
            '<ruby>盆踊<rt>ぼんおど</rt></ruby>りを<br>1<ruby>曲以上<rt>きょくいじょう</rt></ruby>おどった',
            '学校の<br><ruby>先生<rt>せんせい</rt></ruby>に会った', // ここに移動
            '<ruby>消防団<rt>しょうぼうだん</rt></ruby>の人に<br><ruby>挨拶<rt>あいさつ</rt></ruby>した'  // ここに移動
        ];

        const board = document.getElementById('board');
        
        items.forEach((text) => {
            const cell = document.createElement('div');
            cell.classList.add('cell');
            
            const cellText = document.createElement('div');
            cellText.classList.add('cell-text');
            cellText.innerHTML = text;
            cell.appendChild(cellText);
            
            const video = document.createElement('video');
            video.classList.add('stamp-video');
            video.src = 'uchiwa.mp4';
            video.loop = true;
            video.muted = true; 
            video.setAttribute('playsinline', ''); 
            
            // 真っ黒画面を防ぐエラーハンドリング
            video.onerror = () => {
                video.style.display = 'none';
            };
            
            cell.appendChild(video);

            cell.addEventListener('click', () => {
                cell.classList.toggle('selected');
                if(cell.classList.contains('selected')) {
                    video.play().catch(e => console.log(e));
                } else {
                    video.pause();
                    video.currentTime = 0;
                }
            });

            board.appendChild(cell);
        });
    </script>
</body>
</html>
